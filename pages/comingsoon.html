<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feature Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 0.75rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid #1f2937;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 0.75rem;
      }
      p {
        margin: 0.4rem 0;
        color: #9ca3af;
      }
      .tag {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: #111827;
        color: #fbbf24;
        border: 1px solid #374151;
      }
      .back-link {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.6rem 1.2rem;
        border-radius: 999px;
        border: 1px solid #4b5563;
        color: #e5e7eb;
        text-decoration: none;
        font-size: 0.9rem;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease;
      }
      .back-link:hover {
        background: #e5e7eb;
        color: #111827;
        border-color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="tag">Not implemented yet</div>
      <h1>This feature is still being built</h1>
      <p>The page you tried to open is not available yet.</p>
      <p>Please check back later while I finish wiring things up.</p>
      <a href="../index.html" class="back-link">Back to home</a>
    </div>
  </body>
</html>
